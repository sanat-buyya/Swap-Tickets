<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Component</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* Your existing navbar styles here */
    .navbar {
      background: linear-gradient(135deg, rgb(128, 64, 64), #4a90e2);
      color: #fff;
      padding: 0.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 70px;
    }

    .navbar h1 {
      font-size: 1.75rem;
      font-weight: 600;
      background: linear-gradient(to right, #fff 0%, #ffd166 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 101;
    }

    .navbar a {
      text-decoration: none;
      color: inherit;
    }

    .navbar h1 i {
      font-size: 1.5rem;
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 101;
      padding: 0.5rem;
      transition: all 0.4s ease;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      background-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .user-avatar:hover {
      transform: scale(1.05);
      background-color: rgba(255, 255, 255, 0.3);
    }

    .username {
      font-weight: 500;
    }

    .logout-btn {
      background-color: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .logout-btn:hover {
      background-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    .logout-btn i {
      font-size: 0.9rem;
    }

    /* Mobile Menu Styles */
    .mobile-menu {
      display: none;
      list-style: none;
      width: 100%;
      padding: 0;
      margin: 0;
    }

    .mobile-menu li {
      width: 100%;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0;
      transform: translateX(50px);
      transition: all 0.5s ease;
    }

    .mobile-menu li:last-child {
      border-bottom: none;
    }

    .mobile-menu .menu-item {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      color: white;
      text-decoration: none;
      transition: all 0.4s ease;
      width: 100%;
    }

    .mobile-menu .menu-item:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateX(5px);
    }

    .mobile-menu .menu-item i {
      margin-right: 12px;
      font-size: 1.1rem;
      width: 24px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .mobile-menu .menu-item:hover i {
      transform: scale(1.1);
    }

    /* Responsive Styles */
    @media (max-width: 992px) {
      .navbar {
        padding: 1rem 1.5rem;
      }
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      .navbar-right {
        position: fixed;
        top: 0;
        right: -100%;
        width: 70%;
        max-width: 300px;
        height: 100vh;
        background: linear-gradient(135deg, rgb(128, 64, 64), #4a90e2);
        flex-direction: column;
        justify-content: flex-start;
        padding: 5rem 0 2rem;
        gap: 0;
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        transition: right 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s;
      }

      .navbar-right.active {
        right: 0;
        transition: right 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .navbar-right.active .mobile-menu li {
        opacity: 1;
        transform: translateX(0);
      }

      .navbar-right.active .mobile-menu li:nth-child(1) { transition-delay: 0.1s; }
      .navbar-right.active .mobile-menu li:nth-child(2) { transition-delay: 0.3s; }
      .navbar-right.active .mobile-menu li:nth-child(3) { transition-delay: 0.5s; }
      .navbar-right.active .mobile-menu li:nth-child(4) { transition-delay: 0.7s; }
      .navbar-right.active .mobile-menu li:nth-child(5) { transition-delay: 1.1s; }
      .navbar-right.active .mobile-menu li:nth-child(6) { transition-delay: 1.3s; }
      .navbar-right.active .mobile-menu li:nth-child(7) { transition-delay: 1.5s; }
      .navbar-right.active .mobile-menu li:nth-child(8) { transition-delay: 1.7s; }

      .user-info, .logout-btn {
        display: none;
      }

      .mobile-menu {
        display: block;
      }

      .mobile-user-info {
        display: flex;
        align-items: center;
        padding: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }

      .mobile-user-avatar {
        width: 42px;
        height: 42px;
        background-color: rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 1.1rem;
        margin-right: 12px;
      }

      .mobile-username {
        font-weight: 500;
        font-size: 1rem;
      }
    }

    @media (max-width: 576px) {
      .navbar h1 {
        font-size: 1.4rem;
      }

      .navbar-right {
        width: 80%;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar Component -->
  <div th:fragment="navbar">
    <div class="navbar">
      <a th:href="@{/user/home}">
        <h1>
          <img src="/docs/swaplogo.png" alt="logo" height="50px">           SwapTicket
        </h1>
      </a>
      
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      
      <div class="navbar-right" id="navbarRight">
        <!-- Mobile User Info -->
        
        
        <ul class="mobile-menu">
          <li>
            <a th:href="@{/user/home}" class="menu-item">
              <i class="fas fa-home"></i>
              Dashboard
            </a>
          </li>
          <li>
            <a th:href="@{/user/transactions}" class="menu-item">
              <i class="fas fa-history"></i>
              Transaction History
            </a>
          </li>
          <li>
            <a th:href="@{/pnr/sell}" class="menu-item">
              <i class="fas fa-plus-circle"></i>
              Share Journey
            </a>
          </li>
          <li>
            <a th:href="@{/pnr/buy}" class="menu-item">
              <i class="fas fa-search-dollar"></i>
              Explore Journeys
            </a>
          </li>
          <li>
            <a th:href="@{/pnr/my-purchases}" class="menu-item">
              <i class="fas fa-receipt"></i>
              My Viewed Journeys
            </a>
          </li>
          <li>
            <a th:href="@{/my-listed-tickets}" class="menu-item">
              <i class="fas fa-eye"></i>
              My Shared Details
            </a>
          </li>
          <li>
            <a th:href="@{/user/refer}" class="menu-item">
              <i class="fas fa-users"></i>
              Refer Friends
            </a>
          </li>
          <li>
            <a th:href="@{/support/faq}" class="menu-item">
              <i class="fas fa-comments"></i>
              Support
            </a>
          </li>
        </ul>
        
        <!-- Desktop User Info -->
        <div class="user-info">
          <div class="user-avatar">
            <span th:text="${#strings.substring(userName, 0, 1)} ?: 'U'">U</span>
          </div>
          <div class="username" th:text="${userName} ?: 'User'">User</div>
        </div>
        
        <a th:href="@{/logout}" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </a>
      </div>
    </div>
  </div>

  <script th:inline="javascript">
    /*<![CDATA[*/
    // Mobile menu functionality
    document.addEventListener('DOMContentLoaded', function() {
      const menuToggle = document.getElementById('menuToggle');
      const navbarRight = document.getElementById('navbarRight');

      if (menuToggle && navbarRight) {
        menuToggle.addEventListener('click', (e) => {
          e.stopPropagation();
          navbarRight.classList.toggle('active');

          setTimeout(() => {
            menuToggle.innerHTML = navbarRight.classList.contains('active')
              ? '<i class="fas fa-times"></i>'
              : '<i class="fas fa-bars"></i>';
          }, 200);
        });

        // Close menu when clicking outside on mobile
        document.addEventListener('click', (e) => {
          if (window.innerWidth <= 768) {
            if (!navbarRight.contains(e.target) && e.target !== menuToggle) {
              navbarRight.classList.remove('active');
              setTimeout(() => {
                menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
              }, 300);
            }
          }
        });

        // Close menu when clicking on menu items
        document.querySelectorAll('.mobile-menu .menu-item').forEach(item => {
          item.addEventListener('click', () => {
            setTimeout(() => {
              navbarRight.classList.remove('active');
              setTimeout(() => {
                menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
              }, 200);
            }, 150);
          });
        });
      }
    });
    /*]]>*/
  </script>
</body>
</html>
