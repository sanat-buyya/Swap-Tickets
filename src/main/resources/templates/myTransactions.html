<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Transaction History</title>
    <link rel="icon" href="/docs/swaplogo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 0;
    background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        
}
h1 {
   color: var(--primary);
    font-size: 28px;
    margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
}
.transaction-table {
    width: 95%;
    max-width: 800px;
    margin: 32px auto 0 auto;
    border-collapse: separate;
    border-spacing: 0;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(44,62,80,0.07);
    overflow: hidden;
}
.transaction-table th, .transaction-table td {
    padding: 16px 18px;
    text-align: left;
}
.transaction-table thead {
    background: #f0f4fa;
}
.transaction-table th {
    color: #4a90e2;
    font-size: 1.05rem;
    font-weight: 600;
    border-bottom: 1px solid #e6eaf0;
}
.transaction-table tbody tr {
    transition: background 0.2s;
}
.transaction-table tbody tr:hover {
    background: #f6fafd;
}
.transaction-table td {
    color: #2d3748;
    font-size: 1rem;
    border-bottom: 1px solid #f0f4fa;
}
.transaction-table tbody tr:last-child td {
    border-bottom: none;
}
.credited {
    color: #1abc9c;
    font-weight: 600;
}
.debited {
    color: #e74c3c;
    font-weight: 600;
}
.transaction-table td.credited {
    color: #1abc9c !important;
    font-weight: 600;
}
.transaction-table td.debited {
    color: #e74c3c !important;
    font-weight: 600;
}

/* Mobile Responsive Styles */
@media (max-width: 700px) {
    .transaction-table {
        width: 100vw;
        min-width: 100vw;
        max-width: 100vw;
        margin: 0;
        overflow-x: auto;
        table-layout: fixed;
        display: table;
    }
    .transaction-table th,
    .transaction-table td {
        width: 33.33%;
        padding: 12px 8px;
        font-size: 1.0rem;
        white-space: normal;
        word-break: break-word;
        text-align: center;
    }
}
.back-btn {
    display: flex;
    justify-content: center;
    margin: 32px 0 24px 0;
}

.action-btn {
    background: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 12px 28px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(44,62,80,0.08);
    transition: background 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.action-btn i {
    font-size: 1.1em;
}

.action-btn:hover, .action-btn:focus {
    background: #357abd;
    box-shadow: 0 4px 16px rgba(44,62,80,0.12);
    outline: none;
}
/* Navbar Styles */
.navbar {
    background: linear-gradient(135deg, rgb(128, 64, 64), #4a90e2);
    color: #fff;
    padding: 0.5rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar h1 {
font-size: 1.75rem;

background: linear-gradient(to right, #fff 0%, #ffd166 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin: 0;
display: flex;
align-items: center;
gap: 10px;
z-index: 101;
font-style: bold;
}


.navbar a {
    text-decoration: none;
    color: inherit;
}

.navbar h1 i {
    font-size: 1.5rem;
}

.menu-toggle {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 101;
    padding: 0.5rem;
    transition: all 0.4s ease;
}

.navbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.user-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.user-avatar {
    width: 42px;
    height: 42px;
    background-color: rgba(255, 255, 255, 0.2);
    color: #fff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 1.1rem;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.user-avatar:hover {
    transform: scale(1.05);
    background-color: rgba(255, 255, 255, 0.3);
}

.username {
    font-weight: 500;
    color: white;
}

.logout-btn {
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
}

.logout-btn:hover {
    background-color: rgba(255, 255, 255, 0.3);
    transform: translateY(-1px);
}

.logout-btn i {
    font-size: 0.9rem;
}

/* Mobile Menu Styles */
.mobile-menu {
    display: none;
    list-style: none;
    width: 100%;
    padding: 0;
    margin: 0;
}

.mobile-menu li {
    width: 100%;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    opacity: 0;
    transform: translateX(50px);
    transition: all 0.5s ease;
}

.mobile-menu li:last-child {
    border-bottom: none;
}

.mobile-menu .menu-item {
    display: flex;
    align-items: center;
    padding: 1rem 1.5rem;
    color: white;
    text-decoration: none;
    transition: all 0.4s ease;
    width: 100%;
}

.mobile-menu .menu-item:hover {
    background-color: rgba(255, 255, 255, 0.1);
    transform: translateX(5px);
}

.mobile-menu .menu-item i {
    margin-right: 12px;
    font-size: 1.1rem;
    width: 24px;
    text-align: center;
    transition: transform 0.3s ease;
}

.mobile-menu .menu-item:hover i {
    transform: scale(1.1);
}

/* Responsive Styles */
@media (max-width: 992px) {
    .navbar {
        padding: 1rem 1.5rem;
    }
}

@media (max-width: 768px) {
    .menu-toggle {
        display: block;
    }

    .navbar-right {
        position: fixed;
        top: 0;
        right: -100%;
        width: 70%;
        max-width: 300px;
        height: 100vh;
        background: linear-gradient(135deg, rgb(128, 64, 64), #4a90e2);
        flex-direction: column;
        justify-content: flex-start;
        padding: 5rem 0 2rem;
        gap: 0;
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        transition: right 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s;
    }

    .navbar-right.active {
        right: 0;
        transition: right 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .navbar-right.active .mobile-menu li {
        opacity: 1;
        transform: translateX(0);
    }

    .navbar-right.active .mobile-menu li:nth-child(1) { transition-delay: 0.1s; }
    .navbar-right.active .mobile-menu li:nth-child(2) { transition-delay: 0.3s; }
    .navbar-right.active .mobile-menu li:nth-child(3) { transition-delay: 0.5s; }
    .navbar-right.active .mobile-menu li:nth-child(4) { transition-delay: 0.7s; }
    .navbar-right.active .mobile-menu li:nth-child(5) { transition-delay: 1.1s; }
    .navbar-right.active .mobile-menu li:nth-child(6) { transition-delay: 1.3s; }
    .navbar-right.active .mobile-menu li:nth-child(7) { transition-delay: 1.5s; }
    .navbar-right.active .mobile-menu li:nth-child(8) { transition-delay: 1.7s; }

    .user-info, .logout-btn {
        display: none;
    }

    .mobile-menu {
        display: block;
    }

    .mobile-user-info {
        display: flex;
        align-items: center;
        padding: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .mobile-user-avatar {
        width: 42px;
        height: 42px;
        background-color: rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 1.1rem;
        margin-right: 12px;
    }

    .mobile-username {
        font-weight: 500;
        font-size: 1rem;
        color: white;
    }
}

@media (max-width: 576px) {
    .navbar h1 {
        font-size: 1.4rem;
    }

    .navbar-right {
        width: 80%;
    }
}

</style>
</head>
<body>
 <th:block th:replace="components/navbar :: navbar"></th:block>
    <h1>My Transaction History</h1>
    <table class="transaction-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="3" style="text-align:center; color:#888; padding: 32px 0;">
            No Transactions
        </td>
    </tr>
            <tr th:each="txn : ${transactions}">
                <td th:text="${txn.date}" data-label="Date"></td>
                <td th:text="${txn.amount}" data-label="Amount"></td>
                <td th:text="${txn.type}"
    th:classappend="${#strings.toUpperCase(txn.type)} == 'CREDITED' ? 'credited' : 'debited'"
    data-label="Type"></td>
            </tr>
        </tbody>
    </table>
    <div class="back-btn" >
    <button onclick="location.href='/user/home'" class="action-btn">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </button>
</div>
</body>

<script>

// Mobile menu toggle functionality with slower animations
const menuToggle = document.getElementById('menuToggle');
const navbarRight = document.getElementById('navbarRight');

menuToggle.addEventListener('click', (e) => {
e.stopPropagation();
navbarRight.classList.toggle('active');

// Slower icon transition
setTimeout(() => {
menuToggle.innerHTML = navbarRight.classList.contains('active')
? '<i class="fas fa-times"></i>'
: '<i class="fas fa-bars"></i>';
}, 200);
});

// Close menu when clicking outside on mobile with slower animation
document.addEventListener('click', (e) => {
if (window.innerWidth <= 768) {
if (!navbarRight.contains(e.target) && e.target !== menuToggle) {
navbarRight.classList.remove('active');

// Slower icon transition back
setTimeout(() => {
menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
}, 300);
}
}
});

// Close menu when clicking on menu items with delay
document.querySelectorAll('.mobile-menu .menu-item').forEach(item => {
item.addEventListener('click', () => {
// Add delay before closing menu
setTimeout(() => {
navbarRight.classList.remove('active');
setTimeout(() => {
menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
}, 200);
}, 150);
});
});







</script>
</html>
